<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VP 66 | Member Portal</title>

<style>
:root {
    --primary: #ff003c;
    --gold: #ffcc00;
    --silver: #e2e8f0;
    --cyan: #00f2ff;
    --bg: #0a0a0c;
    --hp: #2ecc71;
    --stamina: #f1c40f;
    --skill: #9b59b6;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: radial-gradient(circle at 20% 30%, rgba(255,0,60,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0,242,255,0.15), transparent 40%),
                var(--bg);
    color: #eee;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
    border-bottom: 2px solid var(--primary);
    display: flex;
    justify-content: center;
    z-index: 999;
}

.nav-container { display: flex; }

.nav-item { position: relative; }

.nav-link {
    display: block;
    padding: 18px 22px;
    color: white;
    text-decoration: none;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
}

/* DROPDOWN */
.dropdown-kasta {
    position: absolute;
    top: 100%;
    left: 0;
    background: black;
    min-width: 220px;
    display: none;
    border: 1px solid #333;
}

.nav-item:hover .dropdown-kasta { display: block; }

.kasta-item {
    position: relative;
    border-bottom: 1px solid #222;
}

.dropdown-nama {
    position: absolute;
    left: 100%;
    top: 0;
    min-width: 200px;
    background: #050505;
    display: none;
    border-left: 2px solid var(--primary);
}

.kasta-item:hover .dropdown-nama {
    display: block;
}

.kasta-item > a,
.dropdown-nama a {
    display: block;
    padding: 12px 15px;
    font-size: 12px;
    color: #aaa;
    text-decoration: none;
    cursor: pointer;
}

.dropdown-nama a:hover {
    background: var(--primary);
    color: white;
}

/* PAGE SYSTEM */
.page {
    display: none;
    padding: 120px 20px 60px;
    min-height: 100vh;
    animation: fadeIn .4s ease;
}

.page.active { display: block; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HOME */
#home {
    text-align: center;
}

.logo-main {
    font-size: clamp(3rem, 12vw, 10rem);
    font-weight: 900;
    color: white;
    text-shadow: 0 0 25px var(--primary);
    cursor: pointer;
}

.sub-text {
    color: var(--primary);
    letter-spacing: 10px;
}

/* PROFILE */
.profile-grid {
    max-width: 1100px;
    margin: auto;
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 50px;
    background: rgba(255,255,255,0.02);
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #222;
}

.photo-side img {
    width: 100%;
    border-radius: 6px;
    border: 1px solid #444;
    box-shadow: 0 0 20px rgba(255,0,60,0.4);
}

/* STAT */
.stat-container {
    margin-top: 20px;
}

.stat-row { margin-bottom: 10px; }

.stat-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #777;
    font-weight: 700;
}

.bar-outer {
    height: 8px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #333;
}

.bar-inner {
    height: 100%;
    width: 0;
    transition: 2s ease;
}

.hp-bar { background: var(--hp); }
.stamina-bar { background: var(--stamina); }
.skill-bar { background: var(--skill); }

/* INFO */
.info-side h1 {
    font-size: 3rem;
    margin: 0;
    border-bottom: 4px solid var(--primary);
    display: inline-block;
}

.rank-tag {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

.content-block { margin-top: 20px; }

.content-block h3 {
    color: var(--primary);
    margin: 0;
}

.content-block p {
    color: #bbb;
    line-height: 1.5;
}

.kill-list {
    list-style: none;
    padding: 0;
}

.kill-list li {
    padding: 6px;
    border-left: 3px solid var(--primary);
    background: rgba(255,0,60,0.05);
    margin-bottom: 5px;
    font-size: 13px;
}

/* RESPONSIVE */
@media (max-width: 850px) {
    .profile-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
