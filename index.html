<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VP 66 | Member Portal</title>
    <style>
        :root {
            --primary: #ff003c; 
            --gold: #ffcc00;
            --silver: #e2e8f0;
            --cyan: #00f2ff;
            --bg: #0a0a0c;
            --hp: #2ecc71; 
            --stamina: #f1c40f;
            --skill: #9b59b6;
        }

        body {
            background: var(--bg);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }

        .nav-container { 
            display: flex; 
            justify-content: center;
            overflow-x: auto; /* Biar bisa scroll kalau menu kepanjangan di HP */
            white-space: nowrap;
        }

        .nav-item { position: relative; }
        .nav-link {
            color: white; text-decoration: none; padding: 15px 15px;
            display: block; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; font-size: 0.8rem;
        }

        .dropdown-kasta {
            position: absolute; top: 100%; left: 0; background: #000;
            min-width: 180px; display: none; border: 1px solid #333;
        }

        .nav-item:hover > .dropdown-kasta { display: block; }
        .kasta-item { position: relative; border-bottom: 1px solid #222; }
        
        .dropdown-nama {
            position: absolute; top: 0; left: 100%; background: #050505;
            min-width: 150px; display: none; border-left: 2px solid var(--primary);
        }

        /* Mobile Adjustments for Dropdown */
        @media (max-width: 600px) {
            .dropdown-nama { left: 50%; top: 100%; }
        }

        .kasta-item:hover .dropdown-nama { display: block; }
        .kasta-item > a, .dropdown-nama a {
            padding: 12px 15px; display: block; color: #888; text-decoration: none; font-size: 0.75rem;
            transition: 0.2s; cursor: pointer; text-transform: uppercase;
        }
        .dropdown-nama a:hover { background: var(--primary); color: #fff; font-weight: bold; }

        /* --- PAGE SYSTEM --- */
        .page {
            display: none; padding: 100px 15px 40px; min-height: 100vh;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-in-out;
        }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HOME --- */
        #home { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .logo-main { 
            font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; 
            color: #fff; text-shadow: 3px 3px var(--primary);
            cursor: pointer; transition: 0.3s; margin: 0;
        }
        .sub-text { letter-spacing: 5px; color: var(--primary); font-weight: bold; margin-top: 10px; font-size: 0.9rem; }

        /* --- PROFILE LAYOUT --- */
        .profile-grid {
            max-width: 1100px; margin: 0 auto;
            display: grid; grid-template-columns: 350px 1fr; gap: 30px;
        }

        .photo-side img {
            width: 100%; border-radius: 5px; border: 1px solid #444;
            box-shadow: 8px 8px 0px var(--primary);
        }

        /* --- STAT BARS --- */
        .stat-container { margin-top: 20px; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 5px; border: 1px solid #222; }
        .stat-row { margin-bottom: 10px; }
        .stat-label { font-size: 0.6rem; color: #777; font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; }
        .stat-label span:last-child { color: #fff; }
        .bar-outer { background: #111; height: 6px; margin-top: 5px; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .bar-inner { height: 100%; width: 0; transition: 1.5s cubic-bezier(0.1, 0, 0.2, 1); }
        
        .hp-bar { background: var(--hp); }
        .stamina-bar { background: var(--stamina); }
        .skill-bar { background: var(--skill); }

        .info-side h1 { font-size: 2.5rem; margin: 0; font-weight: 900; color: #fff; border-bottom: 4px solid var(--primary); display: inline-block; }
        .rank-tag { display: block; margin-top: 5px; font-size: 1rem; font-weight: bold; letter-spacing: 1px; }
        .content-block { margin-top: 20px; }
        .content-block h3 { color: var(--primary); text-transform: uppercase; font-size: 0.75rem; margin-bottom: 5px; }
        .content-block p { color: #bbb; line-height: 1.5; font-size: 0.95rem; margin: 0; }
        
        .kill-list { list-style: none; padding: 0; margin-top: 10px; }
        .kill-list li { padding: 8px; background: rgba(255,0,60,0.05); border-left: 4px solid var(--primary); margin-bottom: 5px; font-family: monospace; font-size: 0.8rem; color: #ff94ab; }

        /* RESPONSIVE BREAKPOINT */
        @media (max-width: 850px) { 
            .profile-grid { grid-template-columns: 1fr; gap: 20px; } 
            .info-side h1 { font-size: 2rem; }
            .nav-link { padding: 15px 10px; letter-spacing: 1px; }
            .page { padding-top: 80px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-item"><a onclick="showPage('home')" class="nav-link">Home</a></div>
            <div class="nav-item">
                <a class="nav-link">Anggota ▼</a>
                <div class="dropdown-kasta">
                    <div class="kasta-item">
                        <a style="color:var(--gold)">👑 PENGUASA</a>
                        <div class="dropdown-nama">
                            <a onclick="showPage('p1')">GUZO</a>
                            <a onclick="showPage('p2')">LUIGI</a>
                        </div>
                    </div>
                    <div class="kasta-item">
                        <a style="color:var(--silver)">⚔️ JENDRAL</a>
                        <div class="dropdown-nama"><a onclick="showPage('j1')">SALIM</a></div>
                    </div>
                    <div class="kasta-item">
                        <a style="color:var(--cyan)">🔥 PANGLIMA</a>
                        <div class="dropdown-nama">
                            <a onclick="showPage('pa1')">ABRAHAM</a>
                            <a onclick="showPage('pa2')">GABRIEL</a>
                            <a onclick="showPage('pa3')">KELVIN</a>
                            <a onclick="showPage('pa4')">IGNACIO</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <h1 class="logo-main" onclick="showPage('home')">VP 66</h1>
        <p class="sub-text">VICTORY PRIDE</p>
    </div>

    <div id="member-container"></div>

    <script>
        const members = [
            { 
                id: 'p1', name: 'GUZO', rank: 'PENGUASA', color: '--gold', hp: '100%', st: '95%', sk: '100%', skName: 'AUTHORITY', img: 'https://image2url.com/r2/default/images/1773818996702-1be2ce2f-2c90-42c6-9e12-057220153f14.jpg',
                sikap: 'Tidak takut siapapun kecuali TUHAN YME. Perkataan beliau mutlak.',
                kekuatan: 'Tendangan muaycroy, hook monyet, teleport tak terbatas.',
                catatan: ['Dicari Pak Riko (Insiden Mic)', 'Kabur dari pramuka', 'Railway Outlaw']
            },
            { 
                id: 'p2', name: 'LUIGI', rank: 'PENGUASA', color: '--gold', hp: '90%', st: '85%', sk: '98%', skName: 'INTELLECT', img: 'https://image2url.com/r2/default/images/1773819080532-62fa2fe8-27d9-4ef2-b584-d89057fa33fa.jpg',
                sikap: 'Dingin dan penuh perhitungan. Otak ekspansi wilayah VP 66.',
                kekuatan: 'JJ (Jurus Jitu)',
                catatan: ['Cyber Syndicate Leader', 'Eksportir Jalur Utara']
            },
            { 
                id: 'j1', name: 'SALIM', rank: 'JENDRAL', color: '--silver', hp: '95%', st: '90%', sk: '92%', skName: 'LEADERSHIP', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Salim',
                sikap: 'Disiplin tinggi dan setia kawan. Jembatan komunikasi internal.',
                kekuatan: 'Koordinasi serangan berskala besar.',
                catatan: ["Batalyon 'Iron Fist'", 'Penghianat Internal']
            },
            { 
                id: 'pa1', name: 'ABRAHAM', rank: 'PANGLIMA', color: '--cyan', hp: '98%', st: '100%', sk: '95%', skName: 'COMBAT', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Eky',
                sikap: 'Agresif dan berani menjaga kehormatan VP 66.',
                kekuatan: 'Ahli beladiri taktis dan serangan frontal.',
                catatan: ['Leader Geng Srigala Hitam', 'Pasukan Elit Bayangan']
            },
            { 
                id: 'pa2', name: 'GABRIEL', rank: 'PANGLIMA TEMPUR', color: '--cyan', hp: '92%', st: '88%', sk: '97%', skName: 'SPEED', img: 'https://image2url.com/r2/default/images/1773819124630-84bf3881-2363-42d1-805c-8890f5f594b3.jpg',
                sikap: 'Jagoan tangga UKS, pembantai kesiswaan.',
                kekuatan: 'Merobohkan tembok Zulkarnain, memanggil Yangtuj.',
                catatan: ['Penguasa kubu mate', 'Penghancur hati Ipril']
            },
            { 
                id: 'pa3', name: 'KELVIN', rank: 'PANGLIMA TEMPUR', color: '--cyan', hp: '100%', st: '100%', sk: '90%', skName: 'STAMINA', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Kelvin',
                sikap: 'Benteng berjalan bagi rekan-rekannya.',
                kekuatan: 'Ketahanan fisik luar biasa.',
                catatan: ['The Butcher', "Geng Motor 'Red Skulls'"]
            },
            { 
                id: 'pa4', name: 'IGNACIO', rank: 'PANGLIMA TEMPUR', color: '--cyan', hp: '85%', st: '92%', sk: '94%', skName: 'PRECISION', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Ignacio',
                sikap: 'Elegan namun mematikan. Percaya pada satu serangan tepat.',
                kekuatan: 'Ahli senjata tajam dan titik vital.',
                catatan: ["Master Duel 'Kuro'", 'Penyusup Black Ops']
            }
        ];

        const container = document.getElementById('member-container');
        members.forEach(m => {
            const listItems = m.catatan.map(item => `<li>${item}</li>`).join('');
            container.innerHTML += `
                <div id="${m.id}" class="page">
                    <div class="profile-grid">
                        <div class="photo-side">
                            <img src="${m.img}" alt="${m.name}">
                            <div class="stat-container">
                                <div class="stat-row">
                                    <div class="stat-label">HEALTH POINT <span>${m.hp}</span></div>
                                    <div class="bar-outer"><div class="bar-inner hp-bar" data-val="${m.hp}"></div></div>
                                </div>
                                <div class="stat-row">
                                    <div class="stat-label">STAMINA <span>${m.st}</span></div>
                                    <div class="bar-outer"><div class="bar-inner stamina-bar" data-val="${m.st}"></div></div>
                                </div>
                                <div class="stat-row">
                                    <div class="stat-label">${m.skName} <span>${m.sk}</span></div>
                                    <div class="bar-outer"><div class="bar-inner skill-bar" data-val="${m.sk}"></div></div>
                                </div>
                            </div>
                        </div>
                        <div class="info-side">
                            <span class="rank-tag" style="color:var(${m.color})">KASTA: ${m.rank}</span>
                            <h1>${m.name}</h1>
                            <div class="content-block">
                                <h3>Sikap</h3>
                                <p>${m.sikap}</p>
                            </div>
                            <div class="content-block">
                                <h3>Kekuatan</h3>
                                <p>${m.kekuatan}</p>
                            </div>
                            <div class="content-block">
                                <h3>Catatan / Lawan Dikalahkan</h3>
                                <ul class="kill-list">${listItems}</ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) {
                target.classList.add('active');
                const bars = target.querySelectorAll('.bar-inner');
                setTimeout(() => {
                    bars.forEach(bar => {
                        bar.style.width = bar.getAttribute('data-val');
                    });
                }, 100);
            }
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
